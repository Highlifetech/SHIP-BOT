name: Delivery Date Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (report changes only, no writes)'
        type: boolean
        default: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run cleanup
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_URL: ${{ secrets.LARK_BASE_URL }}
          LARK_SHEET_TOKENS: ${{ secrets.LARK_SHEET_TOKENS }}
          LARK_SHEET_OWNERS: ${{ secrets.LARK_SHEET_OWNERS }}
          LARK_FOLDER_TOKENS: ${{ secrets.LARK_FOLDER_TOKENS }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python cleanup_dates.py
