name: Shipment Tracking Bot

on:
  schedule:
    # 8:00 AM EST (13:00 UTC)
    - cron: '0 13 * * *'
    # 8:00 PM EST (01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no sheet writes, no chat message)'
        type: boolean
        default: false

jobs:
  track-shipments:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Scan-history state (for stuck / customs-hold detection) ---------
      # The stuck detector compares each shipment's status between runs, so it
      # needs the previous run's state file. We restore the most recent saved
      # state here and save the updated file at the end of the job. The key is
      # unique per run (so the save always succeeds) and restore-keys grabs the
      # latest previous state by prefix. Runs every 12h keep the cache warm so
      # it is never evicted (caches drop after 7 unused days).
      - name: Restore scan-history state
        uses: actions/cache/restore@v4
        with:
          path: state/scan_state.json
          key: shipbot-scan-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            shipbot-scan-state-

      - name: Run full tracking summary
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_URL: ${{ secrets.LARK_BASE_URL }}
          LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}
          # New: founders channel for stuck / customs-hold alerts (same secret as other HLT bots).
          LARK_CHAT_ID_FOUNDERS: ${{ secrets.LARK_CHAT_ID_FOUNDERS }}
          LARK_SHEET_TOKENS: ${{ secrets.LARK_SHEET_TOKENS }}
          LARK_SHEET_OWNERS: ${{ secrets.LARK_SHEET_OWNERS }}
          LARK_FOLDER_TOKENS: ${{ secrets.LARK_FOLDER_TOKENS }}
          FEDEX_API_KEY: ${{ secrets.FEDEX_API_KEY }}
          FEDEX_SECRET_KEY: ${{ secrets.FEDEX_SECRET_KEY }}
          UPS_CLIENT_ID: ${{ secrets.UPS_CLIENT_ID }}
          UPS_CLIENT_SECRET: ${{ secrets.UPS_CLIENT_SECRET }}
          USPS_CLIENT_ID: ${{ secrets.USPS_CLIENT_ID }}
          USPS_CLIENT_SECRET: ${{ secrets.USPS_CLIENT_SECRET }}
          DHL_API_KEY: ${{ secrets.DHL_API_KEY }}
          SEVENTEENTRACK_API_KEY: ${{ secrets.SEVENTEENTRACK_API_KEY }}
          # Where the detector reads/writes its state (matches the cache path).
          SCAN_STATE_PATH: state/scan_state.json
          # --- Optional tuning (defaults shown; override via repo secrets) ---
          # STUCK_DAYS: '3'
          # STUCK_ESCALATE_DAYS: '7'
          # NO_MOVE_MIN_OBS: '2'
          # CUSTOMS_MIN_OBS: '2'
        run: python main.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Save scan-history state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/scan_state.json
          key: shipbot-scan-state-${{ github.run_id }}-${{ github.run_attempt }}
